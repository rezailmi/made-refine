name: Publish

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      fix_tags:
        description: 'Fix dist-tags only (no publish)'
        type: boolean
        default: false

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: bun install

      - name: Build
        run: bun run build

      - name: Publish to npm
        if: ${{ !inputs.fix_tags }}
        run: npm publish --tag beta
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Update latest tag
        run: |
          VERSION=$(node -p "require('./package.json').version")
          npm dist-tag add made-refine@$VERSION latest
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
